<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPU Research Knowledge Graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div id="renderer-container">
      <!-- Three.js WebGL canvas goes here -->
    </div>
    <div id="css2d-container">
      <!-- CSS2DRenderer overlay goes here -->
    </div>
    <div id="hud">
      <div id="hud-title">GPU Research Map</div>
      <div id="hud-hint">Scroll to zoom · Drag to pan · Click node to select</div>
    </div>
    <div id="tooltip" class="hidden"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
